<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, viewport-fit=cover"
    />
    <meta name="theme-color" content="#f5f5f4" />
    <title>LambChat Offline</title>
    <style>
      :root {
        color-scheme: light dark;
        font-family:
          "Source Sans 3",
          -apple-system,
          BlinkMacSystemFont,
          "Segoe UI",
          sans-serif;
        background: #f5f5f4;
        color: #292524;
      }

      @media (prefers-color-scheme: dark) {
        :root {
          background: #151210;
          color: #f5f5f4;
        }
      }

      body {
        min-height: 100dvh;
        margin: 0;
        display: grid;
        place-items: center;
        padding: max(1rem, env(safe-area-inset-top)) 1rem
          max(1rem, env(safe-area-inset-bottom));
      }

      main {
        width: min(100%, 28rem);
      }

      h1 {
        margin: 0 0 0.75rem;
        font-size: clamp(1.65rem, 7vw, 2.4rem);
        line-height: 1.08;
        letter-spacing: 0;
      }

      p {
        margin: 0;
        color: #78716c;
        font-size: 1rem;
        line-height: 1.6;
      }

      @media (prefers-color-scheme: dark) {
        p {
          color: #d6d3d1;
        }
      }
    </style>
  </head>
  <body>
    <main>
      <h1>LambChat is offline</h1>
      <p>
        Reconnect to continue chatting, load files, and sync the latest
        workspace state.
      </p>
    </main>
  </body>
</html>
